<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Arena - AI-Driven Wave Shooter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Arial', sans-serif;
        color: #fff;
      }

      #canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #ui {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
      }

      .hud {
        position: absolute;
        pointer-events: none;
        user-select: none;
      }

      /* Top-Left HUD */
      .hud-top-left {
        top: 20px;
        left: 20px;
      }

      .stat-bar {
        width: 300px;
        height: 24px;
        background: rgba(0, 0, 0, 0.7);
        border: 2px solid #00ff00;
        margin-bottom: 10px;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .stat-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #00ff00, #00aa00);
        transition: width 0.3s ease;
        width: 100%;
      }

      .stat-bar.health .stat-bar-fill {
        background: linear-gradient(90deg, #ff0000, #aa0000);
        border-color: #ff0000;
      }

      .stat-bar.xp .stat-bar-fill {
        background: linear-gradient(90deg, #00aaff, #0055ff);
        border-color: #00aaff;
      }

      .stat-label {
        position: absolute;
        left: 8px;
        top: 4px;
        font-size: 12px;
        font-weight: bold;
        z-index: 10;
        color: #fff;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .level-display {
        font-size: 32px;
        font-weight: bold;
        color: #00ff00;
        text-shadow: 0 0 10px #00ff00;
        margin-top: 10px;
      }

      .level-label {
        font-size: 12px;
        color: #00ff00;
      }

      /* Top-Right HUD */
      .hud-top-right {
        top: 20px;
        right: 20px;
        text-align: right;
      }

      .score-counter {
        font-size: 24px;
        color: #00aaff;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .wave-counter {
        font-size: 18px;
        color: #ff00ff;
        font-weight: bold;
      }

      /* Center Crosshair */
      .crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        border: 2px solid #00ff00;
        border-radius: 50%;
        z-index: 100;
        box-shadow: 0 0 5px #00ff00;
      }

      .crosshair::before,
      .crosshair::after {
        content: '';
        position: absolute;
        background: #00ff00;
      }

      .crosshair::before {
        width: 2px;
        height: 10px;
        left: 50%;
        top: -12px;
        transform: translateX(-50%);
      }

      .crosshair::after {
        width: 10px;
        height: 2px;
        left: -12px;
        top: 50%;
        transform: translateY(-50%);
      }

      /* Hotbar */
      .hotbar {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 12px;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border: 2px solid #00ff00;
        border-radius: 8px;
      }

      .ability-slot {
        width: 60px;
        height: 60px;
        background: rgba(20, 20, 20, 0.8);
        border: 2px solid #ff00ff;
        border-radius: 4px;
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        color: #ff00ff;
      }

      .ability-slot:hover {
        box-shadow: 0 0 10px #ff00ff;
      }

      .ability-slot.cooldown::after {
        content: '';
        position: absolute;
        inset: 0;
        background: conic-gradient(#ff0000, transparent);
        border-radius: 4px;
        opacity: 0.5;
      }

      .ability-slot-label {
        position: absolute;
        bottom: -20px;
        font-size: 11px;
        color: #fff;
        white-space: nowrap;
      }

      /* Notifications */
      .notification {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 50, 100, 0.9);
        border: 2px solid #00aaff;
        padding: 20px;
        border-radius: 8px;
        color: #00aaff;
        font-size: 16px;
        font-weight: bold;
        pointer-events: auto;
        z-index: 200;
        animation: popIn 0.3s ease;
      }

      @keyframes popIn {
        from {
          transform: translate(-50%, -50%) scale(0.8);
          opacity: 0;
        }
        to {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      /* Debug FPS Counter */
      #fps-counter {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid #00ff00;
        padding: 8px 12px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        color: #00ff00;
        pointer-events: none;
        display: none;
      }

      /* Menu Styles */
      #menu {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #001a4d 0%, #000033 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        color: #00aaff;
        font-size: 18px;
        pointer-events: auto;
      }

      #menu h1 {
        font-size: 48px;
        margin-bottom: 10px;
        text-shadow: 0 0 20px #00aaff;
      }

      #menu p {
        margin-bottom: 30px;
        max-width: 600px;
        text-align: center;
      }

      #menu button {
        padding: 12px 30px;
        margin: 10px;
        font-size: 16px;
        background: #00ff00;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
      }

      #menu button:hover {
        background: #00aaff;
        box-shadow: 0 0 15px #00aaff;
      }

      /* Game Over Screen */
      #game-over {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1001;
        color: #ff00ff;
        text-align: center;
        pointer-events: auto;
      }
      }

      #game-over h2 {
        font-size: 48px;
        margin-bottom: 20px;
      }

      #game-over .stats {
        background: rgba(20, 20, 20, 0.8);
        border: 2px solid #ff00ff;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
        font-size: 18px;
        line-height: 1.8;
      }

      #game-over .stat-line {
        color: #00aaff;
      }

      #game-over button {
        padding: 12px 30px;
        margin: 10px;
        font-size: 16px;
        background: #ff00ff;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
      }

      #game-over button:hover {
        background: #ff00aa;
        box-shadow: 0 0 15px #ff00aa;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="ui">
      <div id="menu">
        <h1>AI Arena</h1>
        <p>AI-Driven Wave Shooter</p>
        <p>Disable waves of malfunctioning drones while experimenting with AI-generated abilities.</p>
        <button onclick="window.game?.startGame()">Start Game</button>
      </div>

      <div id="game-over">
        <h2>Game Over</h2>
        <div class="stats">
          <div class="stat-line">Wave Reached: <span id="final-wave">0</span></div>
          <div class="stat-line">Total XP: <span id="final-xp">0</span></div>
          <div class="stat-line">Level: <span id="final-level">0</span></div>
          <div class="stat-line">Abilities Acquired: <span id="final-abilities">0</span></div>
        </div>
        <button onclick="window.location.reload()">Play Again</button>
        <button onclick="window.game?.returnToMenu()">Main Menu</button>
      </div>

      <div class="hud hud-top-left">
        <div class="stat-bar health">
          <div class="stat-bar-fill" id="health-bar" style="width: 100%"></div>
          <span class="stat-label" id="health-text">Health: 100/100</span>
        </div>

        <div class="stat-bar xp">
          <div class="stat-bar-fill" id="xp-bar" style="width: 0%"></div>
          <span class="stat-label" id="xp-text">XP: 0/100</span>
        </div>

        <div class="level-display">
          <div class="level-label">LEVEL</div>
          <div id="level-number">1</div>
        </div>
      </div>

      <div class="hud hud-top-right">
        <div class="score-counter">
          Score: <span id="score">0</span>
        </div>
        <div class="wave-counter">
          Wave: <span id="wave">1</span>
        </div>
      </div>

      <div class="crosshair"></div>

      <div class="hotbar">
        <div class="ability-slot" data-slot="1">Slot 1</div>
        <div class="ability-slot" data-slot="2">Slot 2</div>
        <div class="ability-slot" data-slot="3">Slot 3</div>
        <div class="ability-slot" data-slot="4">Slot 4</div>
      </div>

      <div id="fps-counter"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
